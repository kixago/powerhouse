---
- name: Create nvim undo directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/nvim/undo"
    state: directory
    mode: '0755'

- name: Stow nvim config
  ansible.builtin.shell: |
    stow -d {{ stow_dir }} -t {{ stow_target_home }} nvim
  check_mode: false
  register: stow_nvim
  changed_when: stow_nvim.rc != 0
