# ═══════════════════════════════════════════
# 🏠 HYPRLAND CONFIG - Gentoo Edition (0.54+)
# Scrolling Layout + Expo Overview
# ═══════════════════════════════════════════

# 🔌 PLUGIN LOADING
plugin = /usr/lib64/hyprland/libhyprexpo.so

# ═══════════════════════════════════════════
# 🖥️ MONITOR SETUP
# ═══════════════════════════════════════════

# Top Monitor (ASUS 24" - USB4/DP)
monitor = DP-1, 1920x1080@60, 0x0, 1
# Bottom Left (LG Ultrawide 1)
monitor = HDMI-A-1, 2560x1080@75, 0x1080, 1
# Bottom Right (LG Ultrawide 2)
monitor = HDMI-A-2, 2560x1080@100, 2560x1080, 1

# ═══════════════════════════════════════════
# ⌨️ INPUT CONFIGURATION
# ═══════════════════════════════════════════

input {
    kb_layout = us,il
    kb_options = grp:ctrls_toggle,caps:super,shift:both_capslock
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = false
        disable_while_typing = true
    }
}

# ═══════════════════════════════════════════
# 🎨 GENERAL SETTINGS - SCROLLING LAYOUT
# ═══════════════════════════════════════════

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = scrolling
    allow_tearing = false
}

# ═══════════════════════════════════════════
# 🔄 NATIVE SCROLLING LAYOUT CONFIG (0.54+)
# ═══════════════════════════════════════════

scrolling {
    column_width = 1.0
    fullscreen_on_one_column = false
    focus_fit_method = 0
    follow_focus = false
    follow_min_visible = 0.0
    explicit_column_widths = "0.5, 0.75, 0.85, 1.0"
}

# ═══════════════════════════════════════════
# 🔌 PLUGIN CONFIGURATION
# ═══════════════════════════════════════════

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(000000)
        workspace_method = first 1
        gesture_distance = 300
    }
}

# ═══════════════════════════════════════════
# ✨ DECORATIONS
# ═══════════════════════════════════════════

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 7
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        xray = false
        noise = 0.08
        contrast = 1.5
        vibrancy = 0.1696
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# ═══════════════════════════════════════════
# 🎭 ANIMATIONS
# ═══════════════════════════════════════════

animations {
    enabled = true

    # Bezier Curves
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = softSnap, 0.4, 0, 0.2, 1
    bezier = fluent, 0.0, 0.0, 0.2, 1.0

    # Windows
    animation = windows, 1, 5, overshot, popin 80%
    animation = windowsIn, 1, 5, overshot, popin 80%
    animation = windowsOut, 1, 4, smoothOut, popin 95%
    animation = windowsMove, 1, 4, softSnap

    # Layers
    animation = layersIn, 1, 3, smoothIn, slide right
    animation = layersOut, 1, 2, softSnap, slide right

    # Fade
    animation = fade, 1, 4, smoothIn
    animation = fadeIn, 1, 4, smoothIn
    animation = fadeOut, 1, 4, smoothOut
    animation = fadeSwitch, 1, 4, smoothIn
    animation = fadeShadow, 1, 4, smoothIn
    animation = fadeDim, 1, 4, smoothIn
    animation = fadeDpms, 1, 4, smoothIn

    # Workspaces
    animation = workspaces, 1, 5, overshot, slidefade 30%
    animation = specialWorkspace, 1, 5, overshot, slidefadevert 30%
}

# ═══════════════════════════════════════════
# 🪟 FALLBACK LAYOUT SETTINGS
# ═══════════════════════════════════════════

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

# ═══════════════════════════════════════════
# 🛠️ MISCELLANEOUS
# ═══════════════════════════════════════════

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = false
    mouse_move_focuses_monitor = true
    vfr = true
    vrr = 0
}

# ═══════════════════════════════════════════
# ⌨️ VARIABLES
# ═══════════════════════════════════════════

$mod = SUPER
$terminal = wezterm
$fileManager = wezterm start yazi
$menu = rofi -show drun -theme ~/.config/rofi/custom-theme.rasi
# $browser = brave-browser-stable
$browser = firefox

# ═══════════════════════════════════════════
# ⌨️ KEYBINDINGS
# ═══════════════════════════════════════════

# ───────────────────────────────────────────
# 🚀 APPS
# ───────────────────────────────────────────

bind = $mod, Return, exec, $terminal
bind = $mod, Space, exec, $menu
bind = $mod, y, exec, wezterm start -- newsboat -r -q
bind = $mod, P, exec, mpv-single $(wl-paste)
bind = $mod, Z, exec, hyprctl keyword cursor:zoom_factor 1.0
bind = $mod, Q, killactive
bind = $mod SHIFT, M, exit
bind = $mod, E, exec, $fileManager
bind = $mod SHIFT, E, exec, dolphin
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen
bind = $mod, B, exec, $browser
bind = $mod, C, exec, rofi -show calc -modi calc -no-show-match -no-sort
bind = $mod, S, exec, socialstreamninja
# Override Firefox vertical tabs hotkey (translates Ctrl+Alt+/ to Ctrl+Alt+Z)
bind = CTRL ALT, slash, exec, bash -c 'hyprctl activewindow | rg -qi "firefox" && wtype -M ctrl -M alt -k z -m alt -m ctrl || wtype -M ctrl -M alt -k slash -m alt -m ctrl'

# ───────────────────────────────────────────
# 🔄 SCROLLING LAYOUT - Vim-Style Navigation
# ───────────────────────────────────────────

# Focus movement (layout-aware)
# H/L moves between columns, K/J moves within column
bind = $mod, H, layoutmsg, focus l
bind = $mod, L, layoutmsg, focus r
bind = $mod, K, layoutmsg, focus u
bind = $mod, J, layoutmsg, focus d

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Column width cycling
bind = $mod, R, layoutmsg, colresize +conf
bind = $mod SHIFT, R, layoutmsg, colresize -conf

# Fit operations
bind = $mod, W, layoutmsg, fit active
bind = $mod SHIFT, W, layoutmsg, fit visible
bind = $mod ALT, W, layoutmsg, fit all

# Promote window to own column (like vim's ctrl-w T)
bind = $mod, M, layoutmsg, promote

# Swap columns left/right (like reordering vim splits)
bind = $mod ALT, H, layoutmsg, swapcol l
bind = $mod ALT, L, layoutmsg, swapcol r

# ───────────────────────────────────────────
# 🖥️ MONITOR FOCUS
# ───────────────────────────────────────────

bind = $mod, Comma, focusmonitor, -1
bind = $mod, Period, focusmonitor, +1
bind = $mod SHIFT, Comma, movewindow, mon:-1
bind = $mod SHIFT, Period, movewindow, mon:+1

# ───────────────────────────────────────────
# 📊 EXPO OVERVIEW
# ───────────────────────────────────────────

bind = $mod, Tab, hyprexpo:expo, toggle

# ───────────────────────────────────────────
# 🔢 WORKSPACE SWITCHING
# ───────────────────────────────────────────

bind = $mod, bracketleft, workspace, m-1
bind = $mod, bracketright, workspace, m+1
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, minus, workspace, 11
bind = $mod, equal, workspace, 12

# ───────────────────────────────────────────
# 🔢 MOVE WINDOW TO WORKSPACE
# ───────────────────────────────────────────

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod SHIFT, minus, movetoworkspace, 11
bind = $mod SHIFT, equal, movetoworkspace, 12

# ───────────────────────────────────────────
# 📸 SCREENSHOTS
# ───────────────────────────────────────────

bind = , Print, exec, hyprshot -m region
bind = $mod, Print, exec, hyprshot -m output
bind = $mod SHIFT, Print, exec, hyprshot -m window
bind = $mod ALT, Print, exec, hyprshot -m region --raw | satty --filename -
bind = $mod CTRL, Print, exec, hyprshot -m output --raw | satty --filename -

# ───────────────────────────────────────────
# 🔊 MEDIA / AUDIO
# ───────────────────────────────────────────

bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause

# Repeat bindings for smooth volume control
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-

# ───────────────────────────────────────────
# 🔒 SYSTEM
# ───────────────────────────────────────────

bind = $mod SHIFT, Q, exec, wlogout
bind = $mod CTRL, L, exec, hyprlock
bind = $mod, slash, exec, rofi-cheatsheet

# ───────────────────────────────────────────
# 🖱️ MOUSE BINDINGS
# ───────────────────────────────────────────

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ═══════════════════════════════════════════
# 📋 WINDOW RULES (0.53+ match: syntax)
# ═══════════════════════════════════════════

# ───────────────────────────────────────────
# 📧 Aerc Mail
# ───────────────────────────────────────────

windowrule {
    name = aerc-mail-config
    match:class = ^(aerc-mail)$
    size = 1200 800
    center = on
}

# ───────────────────────────────────────────
# 🔧 System Dialogs
# ───────────────────────────────────────────

windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(.blueman-manager-wrapped)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:class ^(Bitwarden)$

# ───────────────────────────────────────────
# 📁 File Dialogs - Float and Center
# ───────────────────────────────────────────

windowrule {
    name = open-file-dialog
    match:title = ^(Open File)$
    float = on
    center = on
}

windowrule {
    name = save-file-dialog
    match:title = ^(Save File)$
    float = on
    center = on
}

windowrule {
    name = save-as-dialog
    match:title = ^(Save As)$
    float = on
    center = on
}

windowrule {
    name = open-folder-dialog
    match:title = ^(Open Folder)$
    float = on
    center = on
}

windowrule {
    name = export-dialog
    match:title = ^(Export)$
    float = on
    center = on
}

windowrule {
    name = import-dialog
    match:title = ^(Import)$
    float = on
    center = on
}

# ───────────────────────────────────────────
# 🌐 XDG Desktop Portals
# ───────────────────────────────────────────

windowrule {
    name = xdg-portal-gtk
    match:class = ^(xdg-desktop-portal-gtk)$
    float = on
    center = on
}

windowrule {
    name = xdg-portal-hyprland
    match:class = ^(xdg-desktop-portal-hyprland)$
    float = on
    center = on
}

# ───────────────────────────────────────────
# 📱 KDE Connect
# ───────────────────────────────────────────

windowrule = float on, match:class ^(org.kde.kdeconnect.*)$
windowrule = float on, match:title ^(KDE Connect)$

# ───────────────────────────────────────────
# 🖼️ Picture-in-Picture
# ───────────────────────────────────────────

windowrule {
    name = pip-window
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    keep_aspect_ratio = on
}

# ───────────────────────────────────────────
# 💬 Telegram Media Viewer
# ───────────────────────────────────────────

windowrule {
    name = telegram-media-viewer
    match:class = ^(org.telegram.desktop)$
    match:title = ^(Media viewer)$
    float = on
}

# ───────────────────────────────────────────
# 🏢 Workspace Assignments
# ───────────────────────────────────────────

windowrule = workspace 2, match:class ^(brave-browser)$
windowrule = workspace 6, match:class ^(org.telegram.desktop)$
windowrule = workspace 6, match:class ^(discord)$
windowrule = workspace 7, match:class ^(mpv)$
windowrule = workspace 7, match:class ^(vlc)$
windowrule = workspace 10 silent, match:class ^(socialstream)$
windowrule = workspace 10 silent, match:title ^(Social Stream Ninja)$

# ───────────────────────────────────────────
# 🔍 OPACITY RULES (frosted glass effect!)
# ───────────────────────────────────────────

# Social Stream
windowrule = opacity 0.95 0.95, match:class ^(socialstream)$

# Terminals - more transparent for that hacker aesthetic
windowrule = opacity 0.88 0.78, match:class ^(org.wezfurlong.wezterm)$

# Browsers
windowrule = opacity 0.92 0.85, match:class ^(brave-browser)$
windowrule = opacity 0.92 0.85, match:class ^(firefox)$

# File Managers
windowrule = decorate off, opacity 0.92 0.85, match:class ^(org.kde.dolphin)$

# Chat Apps
windowrule = opacity 0.92 0.88, match:class ^(org.telegram.desktop)$
windowrule = opacity 0.92 0.88, match:class ^(discord)$

# Video Players - KEEP OPAQUE for proper viewing
windowrule = opacity 1.0 1.0, match:class ^(mpv)$
windowrule = opacity 1.0 1.0, match:class ^(vlc)$

# System utilities
windowrule = opacity 0.92 0.88, match:class ^(pavucontrol)$
windowrule = opacity 0.92 0.88, match:class ^(.blueman-manager-wrapped)$

# Rofi launcher
windowrule = opacity 0.92 0.92, match:class ^(Rofi)$

# ───────────────────────────────────────────
# 📐 Floating Terminal Size
# ───────────────────────────────────────────

windowrule {
    name = wezterm-floating
    match:class = ^(org.wezfurlong.wezterm)$
    match:float = true
    size = 1400 900
    center = on
}

# ───────────────────────────────────────────
# 🚫 Suppress Maximize Requests
# ───────────────────────────────────────────

windowrule = suppress_event maximize, match:class .*

# ───────────────────────────────────────────
# 🔇 No Blur on Chromium Right-Click Menus
# ───────────────────────────────────────────

windowrule {
    name = chromium-menus-noblur
    match:class = ^()$
    match:title = ^()$
    no_blur = on
}

# ═══════════════════════════════════════════
# 🪜 LAYER RULES
# ═══════════════════════════════════════════

layerrule {
    name = gtk4-layer-blur
    match:namespace = gtk4-layer-shell
    ignore_alpha = 0.2
    blur = on
}

# ═══════════════════════════════════════════
# 🔢 WORKSPACE ASSIGNMENTS TO MONITORS
# ═══════════════════════════════════════════

# Workspaces 1-5 on LEFT monitor (HDMI-A-1)
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1

# Workspaces 6-10 on RIGHT monitor (HDMI-A-2)
workspace = 6, monitor:HDMI-A-2, default:true
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2
workspace = 10, monitor:HDMI-A-2

# Workspaces 11+ on Top Monitor (DP-1)
workspace = 11, monitor:DP-1, default:true
workspace = 12, monitor:DP-1

# ═══════════════════════════════════════════
# 🚀 STARTUP APPLICATIONS
# ═══════════════════════════════════════════

# exec-once = hyprpaper
exec-once = swaybg -i /home/kixadmin/Pictures/Wallpapers/pexels-jplenio-3131634.png -m fill
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = kdeconnect-indicator
exec-once = xdg-desktop-portal-hypr-remote
exec-once = /usr/libexec/polkit-kde-authentication-agent-1
exec-once = [workspace 2 silent] brave
exec-once = hypridle
# exec-once = python3 ~/.dotfiles/scripts/hyprsunset-daemon.py
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = ags run ~/.config/ags/app.tsx
